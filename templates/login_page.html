<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        body{
            color: white;
            font-family: sans-serif;
            background-color: #131313;
        }
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: row;
            gap: 100px;
        }

        .login{
            border: 1px solid gray;
            border-radius: 50px;
            width: 600px;
            height: 700px;
            gap: 10px;
            flex-direction: column;
        }

        .signup{
            border: 1px solid gray;
            border-radius: 50px;
            width: 600px;
            height: 700px;
            gap: 10px;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login">
            <h1>Login</h1>
            <form action="/login_page/login/" method="post">
                <input type="text" name="username" class="acc_input" placeholder="Enter your username. ex: bob123">
                <input type="password" name="password" class="acc_input" placeholder="Enter your password.">
                <button type="submit" class="submit_button">Submit</button>
            </form>
        </div>
        <div class="signup">
            <h1>Signup</h1>
            <form action="/login_page/signup/" method="post">
                <input type="text" name="username" class="acc_input" placeholder="Enter your username. ex: bob123">
                <input type="password" name="password" class="acc_input" placeholder="Enter your password">
                <button type="submit" class="submit_button">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
